<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMR Lead Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    p.subtitle { color: #555; margin-top: 0; }

    /* Upload zone */
    .upload { border: 2px dashed #aaa; padding: 2rem; text-align: center; border-radius: 8px; margin: 1rem 0; transition: .15s; cursor: pointer; }
    .upload.dragover { border-color: #333; background: #f9f9f9; }
    input[type="file"] { display: none; }
    button.browse { padding: 0.5rem 1.1rem; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button.browse:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status */
    .status { margin: 0.75rem 0; min-height: 1.4em; color: #555; font-size: 0.9rem; }
    .status.error { color: #c00; }

    /* Page section */
    .page-wrap { margin-top: 1.5rem; }
    h2.page-title { font-size: 1rem; margin: 0 0 0.5rem 0; color: #444; }

    /* Page image with overlay */
    .page-img-wrap { position: relative; display: inline-block; max-width: 100%; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 1rem; }
    .page-img-wrap img { display: block; max-width: 100%; height: auto; }
    .page-overlay { position: absolute; left: 0; top: 0; right: 0; bottom: 0; pointer-events: none; }

    /* Segment cards */
    .segments { display: flex; flex-direction: column; gap: 0.75rem; }
    .seg-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .seg-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.75rem; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 0.8rem; font-weight: 600; color: #475569; }
    .seg-header .badge { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 700; }
    .badge-staff { background: #dbeafe; color: #1d4ed8; }
    .seg-body { padding: 0.6rem 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }

    /* Chords row */
    .chords-row { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .chord-pill { background: #fff7ed; border: 1px solid #fed7aa; color: #92400e; padding: 0.15rem 0.5rem; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.85rem; font-weight: 600; }
    .no-chords { color: #94a3b8; font-size: 0.82rem; font-style: italic; }

    /* LMX token display */
    .lmx-wrap { position: relative; }
    .lmx-wrap pre { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 0.78rem; color: #334155; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 0.5rem 0.6rem; margin: 0; max-height: 6em; overflow: hidden; transition: max-height 0.2s; }
    .lmx-wrap pre.expanded { max-height: none; }
    .lmx-expand { font-size: 0.75rem; color: #64748b; background: none; border: none; cursor: pointer; padding: 0.1rem 0; text-decoration: underline; }

    /* Meta / debug collapsible */
    details.dbg { margin-top: 1rem; }
    details.dbg > summary { font-size: 0.85rem; color: #64748b; cursor: pointer; }
    details.dbg pre { font-size: 0.78rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 0.5rem; margin-top: 0.4rem; white-space: pre-wrap; }

    /* Overlay boxes */
    .box-staff { border: 2px solid #2563eb; background: rgba(37,99,235,0.06); position: absolute; }
    .box-chord { border: 1.5px dashed #f97316; background: rgba(249,115,22,0.05); position: absolute; }
  </style>
</head>
<body>
  <h1>OMR Lead Sheet</h1>
  <p class="subtitle">Upload a PDF or image of a jazz lead sheet to transcribe it.</p>

  <div class="upload" id="drop">
    Drop file here or <button class="browse" type="button" id="browse">Browse</button>
  </div>
  <input type="file" id="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.tiff">
  <div class="status" id="status"></div>
  <div id="result"></div>

  <script>
    const drop = document.getElementById('drop');
    const browse = document.getElementById('browse');
    const inp = document.getElementById('file');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    browse.onclick = () => inp.click();
    inp.onchange = () => { if (inp.files[0]) upload(inp.files[0]); };
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => {
      e.preventDefault();
      drop.classList.remove('dragover');
      if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]);
    };

    async function upload(file) {
      status.textContent = 'Processing…';
      status.className = 'status';
      result.innerHTML = '';
      browse.disabled = true;
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/omr/lead-sheet', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error || 'Request failed');
        const segs = (data.pages || []).flatMap(p => p.segments || []);
        status.textContent = `Done — ${segs.length} staff system${segs.length === 1 ? '' : 's'} detected.`;
        render(data);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.className = 'status error';
      } finally {
        browse.disabled = false;
      }
    }

    function render(data) {
      const meta = data.meta || {};
      const pageW = meta.page_width;
      const pageH = meta.page_height;

      for (const page of (data.pages || [])) {
        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';

        // Page image with bounding boxes
        if (page.page_image_data_url) {
          const imgWrap = document.createElement('div');
          imgWrap.className = 'page-img-wrap';

          const img = document.createElement('img');
          img.src = page.page_image_data_url;
          img.alt = 'Page';

          const overlay = document.createElement('div');
          overlay.className = 'page-overlay';

          imgWrap.appendChild(img);
          imgWrap.appendChild(overlay);
          wrap.appendChild(imgWrap);

          const drawBoxes = () => {
            overlay.innerHTML = '';
            if (!pageW || !pageH) return;
            const dW = img.clientWidth, dH = img.clientHeight;
            if (!dW || !dH) return;
            const sX = dW / pageW, sY = dH / pageH;
            for (const seg of (page.segments || [])) {
              const [x, y, w, h] = seg.staff_bbox || [0,0,0,0];
              const box = document.createElement('div');
              box.className = 'box-staff';
              box.style.left = `${x*sX}px`;
              box.style.top  = `${y*sY}px`;
              box.style.width = `${w*sX}px`;
              box.style.height = `${h*sY}px`;
              box.title = 'Staff: ' + (seg.lmx_tokens || []).slice(0,8).join(' ') + '…';
              overlay.appendChild(box);
              if (seg.chord_bbox) {
                const [cx, cy, cw, ch] = seg.chord_bbox;
                const cbox = document.createElement('div');
                cbox.className = 'box-chord';
                cbox.style.left = `${cx*sX}px`;
                cbox.style.top  = `${cy*sY}px`;
                cbox.style.width = `${cw*sX}px`;
                cbox.style.height = `${ch*sY}px`;
                cbox.title = 'Chords: ' + (seg.chords || []).join('  ');
                overlay.appendChild(cbox);
              }
            }
          };
          img.onload = drawBoxes;
          window.addEventListener('resize', drawBoxes);
        }

        // Segment cards
        const segsDiv = document.createElement('div');
        segsDiv.className = 'segments';

        for (let i = 0; i < (page.segments || []).length; i++) {
          const seg = page.segments[i];
          segsDiv.appendChild(makeSegCard(i + 1, seg));
        }
        wrap.appendChild(segsDiv);

        // Debug / meta
        const dbg = document.createElement('details');
        dbg.className = 'dbg';
        const sum = document.createElement('summary');
        sum.textContent = 'Response metadata';
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(meta, null, 2);
        dbg.appendChild(sum);
        dbg.appendChild(pre);
        wrap.appendChild(dbg);

        result.appendChild(wrap);
      }
    }

    function makeSegCard(n, seg) {
      const card = document.createElement('div');
      card.className = 'seg-card';

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'seg-header';
      const badge = document.createElement('span');
      badge.className = 'badge badge-staff';
      badge.textContent = `Staff ${n}`;
      hdr.appendChild(badge);
      const bbox = seg.staff_bbox || [];
      hdr.appendChild(document.createTextNode(`  bbox [${bbox.join(', ')}]`));
      card.appendChild(hdr);

      const body = document.createElement('div');
      body.className = 'seg-body';

      // Chords row
      const chordsRow = document.createElement('div');
      const chords = seg.chords || [];
      if (chords.length > 0) {
        chordsRow.className = 'chords-row';
        for (const c of chords) {
          const pill = document.createElement('span');
          pill.className = 'chord-pill';
          pill.textContent = c;
          chordsRow.appendChild(pill);
        }
      } else {
        chordsRow.className = 'no-chords';
        chordsRow.textContent = 'No chords detected';
      }
      body.appendChild(chordsRow);

      // LMX tokens
      const lmxWrap = document.createElement('div');
      lmxWrap.className = 'lmx-wrap';
      const pre = document.createElement('pre');
      const tokens = seg.lmx_tokens || [];
      pre.textContent = tokens.length > 0 ? tokens.join(' ') : '(empty)';
      lmxWrap.appendChild(pre);
      if (tokens.length > 40) {
        const btn = document.createElement('button');
        btn.className = 'lmx-expand';
        btn.textContent = 'Show all';
        btn.onclick = () => {
          const expanded = pre.classList.toggle('expanded');
          btn.textContent = expanded ? 'Collapse' : 'Show all';
        };
        lmxWrap.appendChild(btn);
      }
      body.appendChild(lmxWrap);

      card.appendChild(body);
      return card;
    }
  </script>
</body>
</html>
